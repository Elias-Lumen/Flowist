<!DOCTYPE html>
<html>
<head>
    <title>Flowist</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
        }

        .sidebar {
            
            width: 60px;
            height: 100vh;
            background-color: #7dc5f2;
            color: white;
            padding: 10px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;

        }

        .content {
            flex: 1;
            padding: 30px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Menu</h2>
        <a href="/">Home</a>
        <a href="/tasks">Tasks</a>
        <a href="/Cat">Cat</a>

    <div class="content">

        <p>Feed your cat!</p>
    </div>

</body>
</html>
